# Builder configuration for easy_mcp_generator
builders:
  mcpBuilder:
    target: ":easy_mcp_generator"
    import: "package:easy_mcp_generator/builder/mcp_builder.dart"
    builder_factories: ["mcpBuilder"]
    build_extensions:
      .dart:
        - .mcp.dart
        - .mcp.json
    auto_apply: dependents
    build_to: source