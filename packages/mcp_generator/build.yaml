# Builder configuration for mcp_generator
builders:
  mcpBuilder:
    target: ":mcp_generator"
    import: "package:mcp_generator/builder/mcp_builder.dart"
    builder_factories: ["mcpBuilder"]
    build_extensions:
      .dart:
        - .mcp.dart
        - .mcp.json
    auto_apply: dependents
    build_to: source